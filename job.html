<!DOCTYPE html>
<html class="dark" lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Removed Job Snapshot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            base: "#07111f",
            panel: "#111d2d",
            panelSoft: "#172437",
            accent: "#4ade80",
            sky: "#38bdf8",
            text: "#e2e8f0",
            muted: "#94a3b8",
            rose: "#fb7185",
            amber: "#f59e0b"
          },
          fontFamily: {
            heading: ["Inter", "sans-serif"],
            body: ["Space Grotesk", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    body {
      background:
        radial-gradient(circle at top right, rgba(251, 113, 133, 0.16), transparent 26%),
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 24%),
        linear-gradient(180deg, #07111f 0%, #0b1627 46%, #08111d 100%);
    }

    .glass-panel {
      background: rgba(17, 29, 45, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.14);
      backdrop-filter: blur(20px);
    }

    .snapshot-html ul {
      list-style: disc;
      margin-left: 1.25rem;
    }

    .snapshot-html li {
      margin-top: 0.45rem;
    }
  </style>
</head>
<body class="min-h-screen text-text font-body">
  <main class="mx-auto flex min-h-screen max-w-5xl flex-col gap-6 px-5 py-8 md:px-8">
    <header class="glass-panel rounded-[28px] p-5">
      <a class="text-sm font-semibold text-sky hover:text-accent" href="./google-careers-dashboard.html">Back to tracker</a>
      <div class="mt-5 flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
        <div>
          <p class="text-xs uppercase tracking-[0.3em] text-rose">Removed Snapshot</p>
          <h1 class="mt-3 font-heading text-3xl font-extrabold tracking-tight md:text-4xl" id="job-title">Loading...</h1>
          <p class="mt-3 text-sm text-muted" id="job-meta"></p>
        </div>
        <span class="w-fit rounded-full border border-rose/25 bg-rose/10 px-4 py-2 text-sm font-bold text-rose">Removed</span>
      </div>
    </header>

    <section class="grid gap-4 md:grid-cols-4" id="job-stats"></section>

    <section class="glass-panel rounded-[28px] p-5">
      <div class="flex flex-wrap gap-3" id="job-actions"></div>
    </section>

    <section class="grid gap-5" id="job-content"></section>
  </main>

  <script>
    const DETAILS_URL = "./data/google-careers-removed-details.json";
    const params = new URLSearchParams(window.location.search);
    const jobId = params.get("id");

    const refs = {
      title: document.getElementById("job-title"),
      meta: document.getElementById("job-meta"),
      stats: document.getElementById("job-stats"),
      actions: document.getElementById("job-actions"),
      content: document.getElementById("job-content")
    };

    initialize();

    async function initialize() {
      if (!jobId) {
        renderError("No job id provided.");
        return;
      }

      try {
        const response = await fetch(DETAILS_URL);
        if (!response.ok) {
          throw new Error(`Failed to load ${DETAILS_URL}: ${response.status}`);
        }

        const payload = await response.json();
        const job = (payload.jobs || []).find((item) => item.id === jobId);
        if (!job) {
          renderError("Snapshot not generated for this removed job yet.");
          return;
        }

        renderJob(job);
      } catch (error) {
        renderError(String(error));
      }
    }

    function renderJob(job) {
      refs.title.textContent = job.title || "Untitled job";
      refs.meta.textContent = [job.company, job.requestedLocation, formatLocations(job.locations)].filter(Boolean).join(" · ");

      refs.stats.replaceChildren(
        createStat("First seen", formatDate(job.firstSeenAt)),
        createStat("Last seen", formatDate(job.lastSeenAt)),
        createStat("Removed", formatDate(job.removedAt)),
        createStat("Experience", job.experienceLevelRaw || "n/a")
      );

      refs.actions.replaceChildren(
        createLink("Original Google link", job.url),
        createLink("Apply link", job.applyUrlRaw)
      );

      refs.content.replaceChildren(
        createSection("About the job", job.aboutTheJobRaw),
        createSection("Responsibilities", job.responsibilitiesRaw),
        createSection("Minimum qualifications", job.minimumQualificationsRaw),
        createSection("Preferred qualifications", job.preferredQualificationsRaw),
        createSection("Locations", renderLocations(job))
      );
    }

    function createStat(label, value) {
      const card = document.createElement("article");
      card.className = "glass-panel rounded-[22px] p-4";
      const title = document.createElement("p");
      title.className = "text-xs uppercase tracking-[0.24em] text-muted";
      title.textContent = label;
      const body = document.createElement("p");
      body.className = "mt-3 text-sm font-semibold text-text";
      body.textContent = value || "n/a";
      card.append(title, body);
      return card;
    }

    function createLink(label, href) {
      const link = document.createElement("a");
      link.className = "rounded-full border border-white/10 px-4 py-2 text-sm font-semibold text-text transition-colors hover:border-sky hover:text-sky";
      link.href = href || "#";
      link.target = "_blank";
      link.rel = "noreferrer";
      link.textContent = label;
      if (!href) {
        link.className += " pointer-events-none opacity-45";
      }
      return link;
    }

    function createSection(title, content) {
      const section = document.createElement("section");
      section.className = "glass-panel rounded-[28px] p-5";
      const heading = document.createElement("h2");
      heading.className = "font-heading text-xl font-bold";
      heading.textContent = title;
      const body = document.createElement("div");
      body.className = "snapshot-html mt-4 text-sm leading-7 text-muted";
      if (content) {
        body.innerHTML = content;
      } else {
        body.textContent = "No saved data for this section.";
      }
      section.append(heading, body);
      return section;
    }

    function renderLocations(job) {
      const detailed = job.locationsRawDetailed || [];
      if (detailed.length) {
        return `<ul>${detailed.map((location) => `<li>${escapeHtml(location.displayName || "Unknown location")}</li>`).join("")}</ul>`;
      }

      return formatLocations(job.locations) || null;
    }

    function formatLocations(locations) {
      return Array.isArray(locations) && locations.length ? locations.join(", ") : "";
    }

    function formatDate(value) {
      if (!value) {
        return "n/a";
      }

      return new Intl.DateTimeFormat("uk-UA", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date(value));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function renderError(message) {
      refs.title.textContent = "Snapshot unavailable";
      refs.meta.textContent = message;
      refs.stats.replaceChildren();
      refs.actions.replaceChildren();
      refs.content.replaceChildren();
    }
  </script>
</body>
</html>
