<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Aurora Effect</title>
    <style>
        body {
            margin: 0;
            background: #000; /* Темний фон як основа */
            overflow: hidden;
            height: 100vh;
        }

        .aurora-container {
            position: absolute;
            width: 100%;
            height: 100%;
            filter: blur(80px); /* Головний секрет — сильне розмиття */
            opacity: 0.7;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: move 20s infinite alternate;
        }

        /* Різні кольори для "хвиль" */
        .blob-1 { background: #00ffcc; left: -10%; top: -10%; }
        .blob-2 { background: #3333ff; right: -10%; top: 20%; animation-duration: 25s; }
        .blob-3 { background: #ff00ff; left: 20%; bottom: -10%; animation-duration: 15s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(20vw, 30vh) scale(1.5); }
        }

        .map-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 400px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 255, 204, 0.3);
            z-index: 10;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .title {
            color: white;
            position: relative;
            font-family: sans-serif;
            text-align: center;
            margin-top: 20px;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="aurora-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <h1 class="title">Ефект Аврори</h1>
    <div class="map-container">
        <div id="map"></div>
    </div>

    <script>
        function initMap() {
            const mapOptions = {
                zoom: 10,
                center: { lat: 50.4501, lng: 30.5234 }, // Kyiv, Ukraine
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                    { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                    {
                        featureType: "administrative.locality",
                        elementType: "labels.text.fill",
                        stylers: [{ color: "#d59563" }]
                    },
                    {
                        featureType: "poi",
                        elementType: "labels.text.fill",
                        stylers: [{ color: "#d59563" }]
                    },
                    {
                        featureType: "poi.park",
                        elementType: "geometry",
                        stylers: [{ color: "#263c3f" }]
                    },
                    {
                        featureType: "road",
                        elementType: "geometry",
                        stylers: [{ color: "#38414e" }]
                    }
                ]
            };
            const map = new google.maps.Map(document.getElementById("map"), mapOptions);
        }
    </script>
    <!-- Replace YOUR_API_KEY with your actual Google Maps API key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
</body>
</html>
